name: keepbillnotes
description: Keepsplit — real-time collaborative note-taking and bill splitting app with liquid glass UI.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.5.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1
  supabase_flutter: ^2.8.0
  go_router: ^14.8.0
  drift: ^2.22.0
  sqlite3_flutter_libs: ^0.5.28
  shared_preferences: ^2.5.0
  uuid: ^4.5.1
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0
  flutter_animate: ^4.5.2
  shimmer: ^3.0.0
  path_provider: ^2.1.5
  path: ^1.9.0
  connectivity_plus: ^6.1.0
  flutter_staggered_grid_view: ^0.7.0
  intl: ^0.19.0
  url_launcher: ^6.3.1
  flutter_dotenv: ^5.2.1
  flutter_displaymode: ^0.6.0
  flutter_local_notifications: ^18.0.0
  permission_handler: ^11.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  build_runner: ^2.4.13
  freezed: ^2.5.7
  json_serializable: ^6.9.0
  drift_dev: ^2.22.0
  riverpod_generator: ^2.6.2
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true

  assets:
    - .env
    - assets/icon/logo png.png

# Generates Android mipmap icons at every density from a single source PNG.
# Run: `dart run flutter_launcher_icons`
flutter_launcher_icons:
  android: "ic_launcher"
  ios: false
  image_path: "assets/icon/logo png.png"
  # Android 8+ adaptive icon: black background + the full image as foreground.
  # Ensures the icon fills whatever shape mask the launcher applies.
  adaptive_icon_background: "#0A0A0A"
  adaptive_icon_foreground: "assets/icon/logo png.png"
  min_sdk_android: 21
